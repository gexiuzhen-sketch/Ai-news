<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI行业早报 - OpenClaw</title>
    <meta property="og:title" content="AI行业早报">
    <meta property="og:description" content="AI行业新闻每日推送">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }
        .header p {
            opacity: 0.9;
            font-size: 14px;
            position: relative;
            z-index: 1;
        }
        .content {
            padding: 40px;
        }
        .placeholder {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .placeholder h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }
        .placeholder p {
            font-size: 16px;
            line-height: 1.6;
        }
        .emoji {
            font-size: 48px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 24px; }
            .content { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI行业早报</h1>
            <p>专注人工智能行业新闻，深度解读前沿技术</p>
        </div>
        <div class="content">
            <div class="placeholder">
                <div class="emoji">🚧</div>
                <h2>页面正在建设中...</h2>
                <p>
                    AI行业早报系统正在开发中。<br>
                    预计很快就会有内容！
                </p>
                <p>
                    <strong>推送时间：</strong><br>
                    🌅 早间：07:30（政策、数据、规划）<br>
                    ☀️ 中午：12:00（市场动态、产品发布）<br>
                    🌆 晚间：18:00（深度报道、行业分析）
                </p>
            </div>
        </div>
    </div>
</body>
</html>
